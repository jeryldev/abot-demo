# fly.toml app configuration file generated for abot-scholarship-demo-2026 on 2026-07-18T14:31:47+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'abot-scholarship-demo-2026'
primary_region = 'sin'
kill_signal = 'SIGTERM'

[deploy]
  release_command = '/app/bin/abot_demo eval "AbotDemo.Release.migrate_and_seed()"'

[build]

[env]
  PHX_HOST = 'abot-scholarship-demo-2026.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
